services:
  postgres:
    image: postgres:16
    container_name: amex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amex
      POSTGRES_USER: amex
      POSTGRES_PASSWORD: amex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  postgres_data:
